<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#071c36">
  <title>NGC Push Admin</title>
  <style>
    :root { font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif; color:#10223a; background:#e8f4ff; }
    * { box-sizing:border-box; }
    body { min-height:100svh; margin:0; padding:max(28px,env(safe-area-inset-top)) 18px max(28px,env(safe-area-inset-bottom)); background:radial-gradient(circle at 88% 2%,rgba(68,214,209,.3),transparent 34%),radial-gradient(circle at 0 70%,rgba(21,120,255,.22),transparent 38%),linear-gradient(155deg,#f8fcff,#e8f4ff 55%,#f8fbfe); }
    main { width:min(100%,520px); margin:auto; }
    .glass { padding:22px; border:1px solid rgba(255,255,255,.9); border-radius:28px; background:rgba(255,255,255,.66); box-shadow:inset 0 1px 0 white,0 22px 50px -28px rgba(7,28,54,.35); backdrop-filter:blur(28px) saturate(170%); -webkit-backdrop-filter:blur(28px) saturate(170%); }
    header { display:flex; align-items:center; gap:13px; margin-bottom:22px; }
    header img { width:52px; height:52px; padding:7px; border-radius:17px; background:linear-gradient(145deg,#0b315c,#1578ff); box-shadow:0 12px 25px rgba(15,78,150,.24); }
    h1 { font-size:22px; letter-spacing:-.03em; margin:0; }
    header p { color:#62748a; font-size:12px; margin:3px 0 0; }
    label { display:block; margin:15px 2px 7px; color:#62748a; font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    input,textarea { width:100%; padding:14px 15px; border:1px solid rgba(17,54,93,.13); border-radius:16px; background:rgba(255,255,255,.74); color:#10223a; font:inherit; font-size:16px; outline:0; box-shadow:inset 0 1px 0 white; }
    textarea { min-height:112px; resize:vertical; }
    input:focus,textarea:focus { border-color:rgba(21,120,255,.55); box-shadow:0 0 0 3px rgba(21,120,255,.11); }
    button { width:100%; min-height:52px; margin-top:18px; border:0; border-radius:17px; color:white; background:linear-gradient(145deg,#0b5ed7,#1578ff); font:inherit; font-weight:800; box-shadow:0 14px 30px rgba(21,120,255,.27); cursor:pointer; }
    button:active { transform:scale(.98); }
    button:disabled { opacity:.55; cursor:wait; }
    .status { min-height:20px; margin:14px 2px 0; color:#62748a; font-size:13px; text-align:center; }
    .status.success { color:#087952; }
    .status.error { color:#c5324d; }
    .back { display:inline-block; margin:18px 0 0; color:#0b5ed7; text-decoration:none; font-size:13px; font-weight:750; }
    @media (prefers-reduced-transparency:reduce) { .glass { background:#fff; backdrop-filter:none; -webkit-backdrop-filter:none; } }
  </style>
</head>
<body>
  <main>
    <section class="glass">
      <header><img src="ngc-logo.png" alt="NGC"><div><h1>Push Notification</h1><p>NGC Super App Admin</p></div></header>
      <label for="title">Title</label><input id="title" value="NGC Super App" maxlength="80">
      <label for="message">Message</label><textarea id="message" maxlength="220" placeholder="Type your notification message"></textarea>
      <label for="url">Open Link</label><input id="url" type="url" value="https://ngc-super-app.vercel.app">
      <label for="token">Admin Key</label><input id="token" type="password" autocomplete="current-password" placeholder="Paste your private admin key">
      <button id="send" type="button">Send Notification</button>
      <p id="status" class="status" role="status" aria-live="polite"></p>
      <a class="back" href="./index.html">← Back to NGC Super App</a>
    </section>
  </main>
  <script>
    const api = "https://bzqgademvvtbpthqoxoj.supabase.co/functions/v1/push-api";
    const send = document.getElementById("send");
    const status = document.getElementById("status");
    send.addEventListener("click", async () => {
      const token = document.getElementById("token").value.trim();
      const body = document.getElementById("message").value.trim();
      status.className = "status";
      if (!token || !body) {
        status.textContent = "Enter the message and admin key.";
        status.classList.add("error");
        return;
      }
      send.disabled = true;
      status.textContent = "Sending…";
      try {
        const response = await fetch(api, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "send",
            adminToken: token,
            title: document.getElementById("title").value,
            body,
            url: document.getElementById("url").value
          })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "Send failed");
        status.textContent = result.total ? `Sent to ${result.sent} of ${result.total} device(s).` : "No subscribed devices yet.";
        status.classList.add("success");
      } catch (error) {
        status.textContent = error.message === "Unauthorized" ? "Admin key is incorrect." : "Could not send. Please try again.";
        status.classList.add("error");
      } finally {
        send.disabled = false;
      }
    });
  </script>
</body>
</html>
