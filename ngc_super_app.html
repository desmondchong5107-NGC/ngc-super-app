<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071c36">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NGC Super App">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=3">
  <title>NGC Super App</title>
  <style>
    :root {
      color-scheme: light;
      --navy: #071c36;
      --navy-2: #0b315c;
      --blue: #1578ff;
      --aqua: #44d6d1;
      --ink: #10223a;
      --muted: #62748a;
      --line: rgba(17, 54, 93, .12);
      --glass: rgba(255,255,255,.46);
      --glass-strong: rgba(255,255,255,.68);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, Segoe UI, sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { min-height: 100%; height: -webkit-fill-available; }
    body { min-height: 100%; min-height: -webkit-fill-available; margin: 0; }
    body {
      color: var(--ink);
      background: #e8f4ff;
      overflow-x: hidden;
      overscroll-behavior-x: none;
      -webkit-text-size-adjust: 100%;
    }
    button { font: inherit; touch-action: manipulation; }
    .home {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      background:
        radial-gradient(circle at 84% 8%, rgba(68, 214, 209, .32), transparent 30%),
        radial-gradient(circle at 2% 58%, rgba(21, 120, 255, .25), transparent 37%),
        radial-gradient(circle at 80% 88%, rgba(125, 105, 255, .14), transparent 30%),
        linear-gradient(160deg, #f9fcff 4%, #e8f4ff 48%, #f8fbfe 100%);
    }
    .home:not([hidden]) { animation:screenIn .38s cubic-bezier(.16,1,.3,1); }
    .home::before, .home::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(2px);
      box-shadow: 0 30px 90px rgba(8, 50, 94, .1), inset 0 1px 0 rgba(255,255,255,.8);
      pointer-events: none;
    }
    .home::before { width: 420px; height: 420px; right: -190px; top: 70px; background:rgba(130,231,228,.16); border:1px solid rgba(255,255,255,.64); animation:floatA 14s ease-in-out infinite alternate; }
    .home::after { width: 290px; height: 290px; left: -155px; bottom: 10px; background:rgba(88,153,255,.12); border:1px solid rgba(255,255,255,.62); animation:floatB 18s ease-in-out infinite alternate; }
    @keyframes floatA { to { transform:translate(-22px,34px) scale(1.05); } }
    @keyframes floatB { to { transform:translate(28px,-26px) scale(.94); } }
    .home-inner {
      position: relative;
      z-index: 1;
      width: min(100%, 980px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(36px, env(safe-area-inset-top)) 22px max(42px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .brandbar {
      display:flex; align-items:center; justify-content:space-between; gap:20px; padding:10px 12px;
      border:1px solid rgba(255,255,255,.7); border-radius:22px;
      background:linear-gradient(145deg,rgba(255,255,255,.62),rgba(255,255,255,.3));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.92),0 16px 38px -20px rgba(18,62,108,.26);
      backdrop-filter:blur(28px) saturate(180%); -webkit-backdrop-filter:blur(28px) saturate(180%);
    }
    .brand { display: flex; align-items: center; gap: 13px; }
    .brand-mark {
      width: 48px; height: 48px; border-radius: 15px; display: grid; place-items: center;
      background: linear-gradient(145deg, var(--navy-2), var(--blue));
      box-shadow:0 14px 30px rgba(15,78,150,.25),inset 0 1.5px 0 rgba(255,255,255,.48),inset 0 -1px 0 rgba(0,0,0,.14);
    }
    .brand-mark img { width:38px; height:38px; object-fit:contain; filter:drop-shadow(0 3px 5px rgba(0,0,0,.2)); }
    .brand-copy { display: grid; gap: 2px; }
    .brand-copy strong { font-size: 17px; letter-spacing: -.02em; }
    .brand-copy span { color: var(--muted); font-size: 12px; font-weight: 650; }
    .version {
      padding: 8px 11px; border: 1px solid var(--line); border-radius: 999px;
      color:var(--muted); background:linear-gradient(145deg,rgba(255,255,255,.68),rgba(255,255,255,.32)); font-size:12px; font-weight:700;
      box-shadow:inset 0 1px 0 white,0 8px 18px rgba(18,62,108,.07);
    }
    .brand-actions { display:flex; align-items:center; gap:8px; }
    .notify-button {
      position:relative; width:42px; height:42px; padding:0; display:grid; place-items:center; cursor:pointer;
      color:var(--navy); border:1px solid rgba(255,255,255,.82); border-radius:14px;
      background:linear-gradient(145deg,rgba(255,255,255,.78),rgba(255,255,255,.38));
      box-shadow:inset 0 1px 0 white,0 8px 20px rgba(18,62,108,.09);
      transition:transform .2s cubic-bezier(.16,1,.3,1),color .2s ease,background .2s ease;
    }
    .notify-button svg { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .notify-button::after {
      content:""; display:none; position:absolute; right:7px; top:7px; width:8px; height:8px; border-radius:50%;
      background:#ff3b30; border:1.5px solid white; box-shadow:0 2px 6px rgba(182,35,29,.28);
    }
    .notify-button.has-unread::after { display:block; }
    .notification-count {
      position:absolute; right:-6px; top:-7px; min-width:20px; height:20px; padding:0 5px; display:grid; place-items:center;
      border-radius:999px; color:white; background:#ff3b30; border:1.5px solid white; font-size:10px; font-weight:850;
      box-shadow:0 6px 12px rgba(182,35,29,.24);
    }
    .notification-count[hidden] { display:none; }
    .notify-button.active { color:#087952; }
    .notify-button:active { transform:scale(.93); }
    .notify-button:disabled { opacity:.55; cursor:wait; }
    .notify-button:focus-visible { outline:4px solid rgba(21,120,255,.22); outline-offset:2px; }
    .sheet-backdrop {
      position:fixed; z-index:200; inset:0; display:flex; align-items:flex-end; justify-content:center;
      padding:max(12px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom));
      background:rgba(4,20,39,.22); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      animation:fadeIn .2s ease;
    }
    .sheet-backdrop[hidden] { display:none; }
    @keyframes fadeIn { from { opacity:0; } }
    .notification-sheet {
      position:relative; width:min(100%,620px); height:min(90svh,780px); overflow:hidden; display:grid; grid-template-rows:auto auto auto minmax(0,1fr) auto;
      border:1px solid rgba(255,255,255,.95); border-radius:30px;
      background:linear-gradient(160deg,rgba(255,255,255,.92),rgba(242,249,255,.82));
      box-shadow:inset 0 1px 0 white,0 28px 80px rgba(7,28,54,.28);
      backdrop-filter:blur(38px) saturate(180%); -webkit-backdrop-filter:blur(38px) saturate(180%);
      animation:sheetUp .38s cubic-bezier(.16,1,.3,1);
    }
    @keyframes sheetUp { from { transform:translateY(34px) scale(.98); opacity:.5; } }
    .sheet-handle { width:38px; height:5px; margin:9px auto 0; border-radius:999px; background:rgba(7,28,54,.16); }
    .sheet-header { padding:10px 18px 13px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .sheet-header h2 { margin:0; color:var(--navy); font-size:21px; letter-spacing:-.035em; }
    .sheet-header p { margin:3px 0 0; color:var(--muted); font-size:12px; }
    .sheet-header-actions { display:flex; align-items:center; gap:7px; }
    .sheet-close,.mark-read,.refresh-updates,.detail-back {
      min-height:40px; padding:0 12px; border:1px solid var(--line); border-radius:14px; cursor:pointer;
      color:var(--blue); background:rgba(255,255,255,.62); font-size:13px; font-weight:750;
    }
    .sheet-close { width:40px; padding:0; color:var(--navy); font-size:19px; }
    .refresh-updates { width:40px; padding:0; color:var(--navy); font-size:18px; }
    .refresh-updates.loading { animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .sheet-tools { padding:0 18px 9px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .sheet-tools span { color:var(--muted); font-size:12px; font-weight:650; }
    .notification-filters { padding:0 12px 10px; display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; }
    .notification-filters::-webkit-scrollbar { display:none; }
    .filter-button { min-height:36px; padding:0 13px; flex:0 0 auto; border:1px solid var(--line); border-radius:999px; cursor:pointer; color:var(--muted); background:rgba(255,255,255,.52); font-size:12px; font-weight:750; }
    .filter-button.active { color:white; border-color:transparent; background:linear-gradient(145deg,#0b5ed7,#1578ff); box-shadow:0 7px 15px rgba(21,120,255,.19); }
    .notification-list { min-height:150px; overflow:auto; padding:0 12px 12px; display:grid; grid-auto-rows:max-content; align-content:start; gap:10px; overscroll-behavior:contain; }
    .update-group-title { padding:7px 6px 2px; color:#708198; font-size:10px; font-weight:850; letter-spacing:.09em; text-transform:uppercase; }
    .notification-empty { padding:42px 22px; color:var(--muted); text-align:center; font-size:14px; line-height:1.5; }
    .update-card {
      width:100%; min-height:108px; height:auto; padding:13px; display:grid; grid-template-columns:auto minmax(0,1fr) auto; gap:11px; align-items:center;
      border:1px solid rgba(255,255,255,.96); border-radius:19px; text-align:left; cursor:pointer;
      color:var(--ink); background:rgba(255,255,255,.68); box-shadow:inset 0 1px 0 white,0 10px 24px -20px rgba(7,28,54,.3);
      transition:transform .18s cubic-bezier(.16,1,.3,1),background .2s ease;
    }
    .update-card:active { transform:scale(.985); }
    .update-card.unread { background:linear-gradient(145deg,rgba(229,244,255,.96),rgba(255,255,255,.78)); }
    .update-card.pinned { border-color:rgba(211,153,39,.36); box-shadow:inset 0 1px 0 white,0 12px 28px -20px rgba(161,104,15,.42); }
    .update-card.pinned .update-category { color:#8a5b0c; background:rgba(229,169,60,.14); }
    .update-symbol { position:relative; width:42px; height:42px; display:grid; place-items:center; border-radius:14px; color:white; background:linear-gradient(145deg,#0b5ed7,#3f91ff); font-size:18px; font-weight:850; box-shadow:0 9px 20px -10px rgba(21,120,255,.55),inset 0 1px 0 rgba(255,255,255,.34); }
    .update-symbol.general { background:linear-gradient(145deg,#087853,#35c893); }
    .update-card.unread .update-symbol::after { content:""; position:absolute; right:-3px; top:-3px; width:9px; height:9px; border-radius:50%; background:#ff3b30; border:2px solid white; }
    .update-copy { min-width:0; overflow:hidden; }
    .update-category { display:inline-block; margin:0 0 5px; padding:3px 7px; border-radius:999px; color:#0b5ed7; background:rgba(21,120,255,.1); font-size:9px; font-weight:850; letter-spacing:.06em; text-transform:uppercase; }
    .update-category.general { color:#087952; background:rgba(34,183,127,.11); }
    .update-copy strong { display:block; color:var(--navy); font-size:14px; line-height:1.3; }
    .update-copy span { display:-webkit-box; margin-top:4px; max-height:2.8em; overflow:hidden; color:var(--muted); font-size:12px; line-height:1.4; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .update-time { color:#8190a2; font-size:10px; white-space:nowrap; }
    .notification-settings { padding:12px 18px max(16px,env(safe-area-inset-bottom)); border-top:1px solid rgba(17,54,93,.09); display:flex; align-items:center; justify-content:space-between; gap:14px; background:rgba(255,255,255,.42); }
    .notification-settings strong { display:block; color:var(--navy); font-size:13px; }
    .notification-settings span { display:block; margin-top:2px; color:var(--muted); font-size:11px; }
    .push-toggle { min-height:40px; padding:0 14px; border:0; border-radius:14px; cursor:pointer; color:white; background:linear-gradient(145deg,#0b5ed7,#1578ff); font-size:12px; font-weight:800; }
    .push-toggle.active { background:linear-gradient(145deg,#087853,#22b77f); }
    .notification-detail-view { position:absolute; z-index:4; inset:0; display:grid; grid-template-rows:auto minmax(0,1fr) auto; background:linear-gradient(160deg,rgba(252,254,255,.98),rgba(237,247,255,.96)); animation:detailIn .3s cubic-bezier(.16,1,.3,1); }
    .notification-detail-view[hidden] { display:none; }
    @keyframes detailIn { from { opacity:.45; transform:translateX(24px); } }
    .detail-header { padding:14px 16px 12px; display:flex; align-items:center; gap:11px; border-bottom:1px solid rgba(17,54,93,.08); }
    .detail-back { width:42px; padding:0; color:var(--navy); font-size:20px; }
    .detail-header-copy { min-width:0; flex:1; }
    .detail-header-copy strong { display:block; overflow:hidden; color:var(--navy); font-size:15px; white-space:nowrap; text-overflow:ellipsis; }
    .detail-header-copy span { display:block; margin-top:2px; color:var(--muted); font-size:11px; }
    .detail-scroll { overflow:auto; padding:18px; overscroll-behavior:contain; }
    .detail-hero { padding:18px; border:1px solid rgba(255,255,255,.96); border-radius:22px; background:linear-gradient(145deg,rgba(255,255,255,.92),rgba(224,242,255,.75)); box-shadow:inset 0 1px 0 white,0 16px 30px -24px rgba(7,28,54,.32); }
    .detail-hero h3 { margin:8px 0 0; color:var(--navy); font-size:23px; line-height:1.15; letter-spacing:-.04em; }
    .detail-hero p { margin:9px 0 0; color:var(--muted); font-size:13px; line-height:1.5; }
    .detail-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
    .detail-metric { padding:11px 9px; border:1px solid rgba(255,255,255,.92); border-radius:15px; background:rgba(255,255,255,.58); }
    .detail-metric small { display:block; color:#708198; font-size:8px; font-weight:850; letter-spacing:.06em; text-transform:uppercase; }
    .detail-metric strong { display:block; margin-top:4px; color:var(--navy); font-size:12px; letter-spacing:-.02em; }
    .detail-body { margin-top:12px; padding:18px; border:1px solid rgba(255,255,255,.96); border-radius:22px; white-space:pre-wrap; color:#334a64; background:rgba(255,255,255,.72); font-size:14px; line-height:1.62; box-shadow:inset 0 1px 0 white; }
    .detail-actions { padding:11px 12px max(13px,env(safe-area-inset-bottom)); display:grid; grid-template-columns:1fr 1fr; gap:8px; border-top:1px solid rgba(17,54,93,.09); background:rgba(255,255,255,.72); }
    .detail-action { min-height:46px; padding:0 12px; border:1px solid var(--line); border-radius:15px; cursor:pointer; color:var(--navy); background:rgba(255,255,255,.76); font-size:12px; font-weight:800; }
    .detail-action.primary { color:white; border-color:transparent; background:linear-gradient(145deg,#0b5ed7,#1578ff); }
    .detail-action.full { grid-column:1/-1; }
    .detail-action[hidden] { display:none; }
    .app-grid {
      width: 100%; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 32px; max-width: 500px; margin: 0 auto; align-self: center;
    }
    .app-card {
      appearance:none; width:100%; min-width:0; padding:8px 2px; text-align:center; cursor:pointer; text-decoration:none; font:inherit;
      position:relative; border:0; border-radius:28px; color:var(--ink); background:transparent;
      transition:transform .34s cubic-bezier(.16,1,.3,1),box-shadow .28s ease,border-color .22s ease;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px;
    }
    .app-card[hidden] { display:none; }
    .app-badge {
      position:absolute; z-index:3; top:2px; right:5px; min-width:34px; height:20px; padding:0 7px;
      display:inline-flex; align-items:center; justify-content:center; border-radius:999px;
      color:white; background:#ff3b30; border:1px solid rgba(255,255,255,.82); font-size:9px; font-weight:850; letter-spacing:.04em;
      box-shadow:0 7px 15px rgba(190,35,28,.2),inset 0 1px 0 rgba(255,255,255,.32);
    }
    .app-badge[hidden] { display:none; }
    .app-card:hover { transform:translateY(-4px) scale(1.025); }
    .app-card:active { transform:scale(.94); transition-duration:.12s; }
    .app-card:focus-visible { outline: 4px solid rgba(21,120,255,.22); outline-offset: 3px; }
    .app-icon {
      width: 92px; height: 92px; border-radius: 26px; display:grid; place-items:center;
      color:white; border:1px solid rgba(255,255,255,.42);
      box-shadow:0 18px 38px -12px rgba(22,104,194,.38),inset 0 1.5px 0 rgba(255,255,255,.48),inset 0 -1px 0 rgba(0,0,0,.14);
    }
    .epf-icon { background:#fff; }
    .epf-icon img { width:88%; height:88%; object-fit:contain; border-radius:50%; }
    .comm-icon { background: linear-gradient(145deg, #1459c8, #3f91ff); }
    .campaign-icon { background:linear-gradient(145deg,#8d5512,#e6a73c 56%,#f4ca79); }
    .campaign-symbol { position:relative; width:34px; height:36px; filter:drop-shadow(0 3px 5px rgba(83,43,4,.25)); }
    .campaign-symbol::before { content:""; position:absolute; left:6px; top:2px; width:4px; height:32px; border-radius:999px; background:white; }
    .campaign-symbol::after { content:""; position:absolute; left:10px; top:4px; width:23px; height:18px; border-radius:2px 5px 5px 2px; background:rgba(255,255,255,.96); clip-path:polygon(0 0,100% 0,78% 50%,100% 100%,0 100%); }
    .icon-bars { display: flex; align-items: end; gap: 5px; height: 31px; }
    .icon-bars i { display: block; width: 7px; border-radius: 5px 5px 2px 2px; background: white; }
    .icon-bars i:nth-child(1) { height: 13px; opacity: .72; }
    .icon-bars i:nth-child(2) { height: 22px; opacity: .86; }
    .icon-bars i:nth-child(3) { height: 31px; }
    .app-card h2 { margin:0; max-width:140px; color:var(--navy); font-size:15px; line-height:1.22; letter-spacing:-.02em; }
    .tool { display:none; min-height:100svh; min-height:-webkit-fill-available; background:#eaf5ff; }
    .tool.active { display:grid; grid-template-rows:auto minmax(0,1fr); height:100svh; height:100dvh; overflow:hidden; animation:screenIn .38s cubic-bezier(.16,1,.3,1); }
    @keyframes screenIn { from { opacity:0; transform:scale(.985) translateY(7px); } to { opacity:1; transform:none; } }
    .toolbar {
      position: relative; z-index: 10; min-height: calc(62px + env(safe-area-inset-top)); padding: calc(9px + env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) 9px max(14px, env(safe-area-inset-left));
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      border-bottom:1px solid rgba(255,255,255,.78);
      background:linear-gradient(145deg,rgba(255,255,255,.72),rgba(255,255,255,.38));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.96),0 12px 30px -18px rgba(11,50,92,.28);
      backdrop-filter:blur(34px) saturate(190%); -webkit-backdrop-filter:blur(34px) saturate(190%);
    }
    .back {
      min-height: 42px; padding: 0 14px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
      border:1px solid rgba(255,255,255,.82); border-radius:15px;
      background:linear-gradient(145deg,rgba(255,255,255,.78),rgba(255,255,255,.4)); color:var(--navy); font-weight:800;
      box-shadow:inset 0 1px 0 white,0 8px 20px rgba(18,62,108,.08); transition:transform .22s cubic-bezier(.16,1,.3,1),background .2s ease;
    }
    .back:hover { background:rgba(255,255,255,.86); }
    .back:active { transform:scale(.95); }
    .tool-title { min-width: 0; text-align: right; }
    .tool-title strong { display: block; color: var(--navy); font-size: 14px; }
    .tool-title span { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }
    .frames { position:relative; min-height:0; overflow:hidden; }
    iframe { display:none; position:absolute; inset:0; width:100%; height:100%; min-height:0; border:0; background:#eaf5ff; }
    iframe.active { display:block; }
    .toast {
      position:fixed; z-index:100; left:50%; bottom:max(22px,calc(env(safe-area-inset-bottom) + 12px));
      max-width:calc(100% - 32px); padding:11px 15px; border-radius:15px; transform:translate(-50%,18px);
      color:white; background:rgba(7,28,54,.9); border:1px solid rgba(255,255,255,.18);
      box-shadow:0 18px 44px rgba(7,28,54,.28); backdrop-filter:blur(22px) saturate(150%); -webkit-backdrop-filter:blur(22px) saturate(150%);
      font-size:13px; font-weight:700; text-align:center; opacity:0; pointer-events:none; transition:opacity .2s ease,transform .28s cubic-bezier(.16,1,.3,1);
    }
    .toast.show { opacity:1; transform:translate(-50%,0); }
    @media (max-width: 650px) {
      .home-inner { padding-left: 16px; padding-right: 16px; }
      .app-grid { grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; max-width:350px; }
      .app-card { padding:8px 0; gap:12px; }
      .app-icon { width:76px; height:76px; border-radius:22px; }
      .app-card h2 { font-size:13px; line-height:1.2; }
      .brand-copy span, .version { display: none; }
      .back { min-width: 88px; min-height: 44px; }
      .notification-list { gap:10px; }
      .update-card { min-height:110px; padding:13px 12px; gap:10px; }
      .update-symbol { width:42px; height:42px; flex:none; }
      .update-copy strong { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    }
    @media (prefers-contrast:more) {
      .brandbar,.toolbar,.back,.notify-button { border-color:rgba(7,28,54,.28); }
      .app-card h2,.tool-title strong,.back { color:#00152d; }
    }

    function storageGet(key, fallback = "") {
      try { return localStorage.getItem(key) ?? fallback; }
      catch { return fallback; }
    }

    function storageSet(key, value) {
      try { localStorage.setItem(key, value); }
      catch {}
    }

    function restoreCachedUpdates() {
      try {
        const cached = JSON.parse(storageGet("ngcCampaignUpdates", "[]"));
        campaignUpdates = normalizeUpdates(cached);
      } catch {
        campaignUpdates = [];
      }
    }

    function saveCachedUpdates() {
      storageSet("ngcCampaignUpdates", JSON.stringify(campaignUpdates.slice(0, 30)));
    }

    restoreCachedUpdates();

    let notificationFilter = storageGet("ngcNotificationFilter", "all");
    if (!["all","unread","campaign","general"].includes(notificationFilter)) notificationFilter = "all";
    let selectedUpdate = null;

    try { readUpdateIds = new Set(JSON.parse(storageGet("ngcReadUpdates", "[]"))); } catch {}

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function applyCampaignConfig(config) {
      const campaign = { ...defaultCampaign, ...config };
      campaignCard.hidden = campaign.enabled === false;
      campaignLabel.textContent = campaign.title || defaultCampaign.title;
      campaignCard.href = campaign.url || defaultCampaign.url;
      campaignCard.setAttribute("aria-label", "Open " + (campaign.title || "Campaign") + " website");

      const now = Date.now();
      const starts = campaign.startDate ? Date.parse(campaign.startDate) : NaN;
      const ends = campaign.endDate ? Date.parse(campaign.endDate) : NaN;
      let badge = campaign.badge || "";
      if (Number.isFinite(starts) && now < starts) badge = "SOON";
      if (Number.isFinite(ends) && now > ends) badge = "ENDED";
      campaignBadge.textContent = badge;
      campaignBadge.hidden = !badge;
    }

    async function loadCampaignConfig() {
      if (location.protocol === "file:") return applyCampaignConfig(defaultCampaign);
      try {
        const response = await fetch("campaign-config.json", { cache: "no-store" });
        if (!response.ok) throw new Error("Campaign config unavailable");
        applyCampaignConfig(await response.json());
      } catch {
        applyCampaignConfig(defaultCampaign);
      }
    }

    function saveReadUpdates() {
      storageSet("ngcReadUpdates", JSON.stringify(Array.from(readUpdateIds).slice(-100)));
    }

    function friendlyUpdateTime(value) {
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return "";
      const today = new Date();
      if (date.toDateString() === today.toDateString()) {
        return date.toLocaleTimeString("en-MY", { hour:"numeric", minute:"2-digit" });
      }
      return date.toLocaleDateString("en-MY", { day:"numeric", month:"short" });
    }

    function friendlyFullDate(value) {
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return "";
      return date.toLocaleString("en-MY", { weekday:"short", day:"numeric", month:"short", year:"numeric", hour:"numeric", minute:"2-digit" });
    }

    function isGeneralUpdate(update) {
      return update.campaign_key === "general" || update.payload?.type === "general";
    }

    function isUpdateActive(update) {
      const expiresAt = update?.payload?.expiresAt;
      if (typeof expiresAt !== "string" || !expiresAt) return true;
      const timestamp = Date.parse(expiresAt);
      return !Number.isFinite(timestamp) || timestamp > Date.now();
    }

    function normalizeUpdates(updates) {
      if (!Array.isArray(updates)) return [];
      return updates.filter(isUpdateActive).sort((left, right) => {
        const pinned = Number(Boolean(right.payload?.pinned)) - Number(Boolean(left.payload?.pinned));
        if (pinned) return pinned;
        return Date.parse(right.published_at || "") - Date.parse(left.published_at || "");
      });
    }

    function matchesNotificationFilter(update) {
      if (notificationFilter === "unread") return !readUpdateIds.has(update.id);
      if (notificationFilter === "campaign") return !isGeneralUpdate(update);
      if (notificationFilter === "general") return isGeneralUpdate(update);
      return true;
    }

    function updateFilterUI() {
      const counts = {
        all: campaignUpdates.length,
        unread: campaignUpdates.filter(update => !readUpdateIds.has(update.id)).length,
        campaign: campaignUpdates.filter(update => !isGeneralUpdate(update)).length,
        general: campaignUpdates.filter(isGeneralUpdate).length
      };
      const labels = { all:"All", unread:"Unread", campaign:"Campaign", general:"General" };
      notificationFilters.querySelectorAll("[data-filter]").forEach(button => {
        const id = button.dataset.filter;
        const active = id === notificationFilter;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
        button.textContent = labels[id] + (counts[id] ? " " + counts[id] : "");
      });
    }

    function syncSystemBadge(unread, registration = null) {
      // Do not erase a push-delivered badge while the notification list is
      // still empty or stale during launch/background resume.
      if (unread === 0 && !badgeSyncReady) return;
      try {
        if (unread > 0 && "setAppBadge" in navigator) navigator.setAppBadge(unread).catch(() => {});
        if (unread === 0 && "clearAppBadge" in navigator) navigator.clearAppBadge().catch(() => {});
      } catch {}
      const worker = registration?.active || navigator.serviceWorker?.controller;
      if (worker) worker.postMessage({ type:"ngc-set-badge", count:unread });
      clearTimeout(remoteBadgeTimer);
      if ("serviceWorker" in navigator && /^https?:$/.test(location.protocol)) {
        remoteBadgeTimer = setTimeout(async () => {
          try {
            const ready = await navigator.serviceWorker.ready;
            const subscription = await ready.pushManager.getSubscription();
            if (subscription) await callPushApi({ action:"syncBadge", endpoint:subscription.endpoint, count:unread });
          } catch {}
        }, 500);
      }
    }

    function refreshUnreadUI() {
      const unread = campaignUpdates.filter(update => !readUpdateIds.has(update.id)).length;
      notificationButton.classList.toggle("has-unread", unread > 0);
      notificationCount.textContent = unread > 9 ? "9+" : String(unread);
      notificationCount.hidden = unread === 0;
      syncSystemBadge(unread);
      notificationMeta.textContent = campaignUpdates.length
        ? (unread ? unread + " unread update" + (unread === 1 ? "" : "s") : "You're all caught up")
        : "No updates yet";
      markAllRead.hidden = unread === 0;
      updateFilterUI();
    }

    function renderUpdates() {
      notificationList.textContent = "";
      const visible = campaignUpdates.filter(matchesNotificationFilter);
      if (!visible.length) {
        const empty = document.createElement("div");
        empty.className = "notification-empty";
        empty.textContent = campaignUpdates.length
          ? "No notifications match this filter."
          : "New Campaign Updates and General Info will appear here.";
        notificationList.appendChild(empty);
        refreshUnreadUI();
        return;
      }

      const newUpdates = visible.filter(update => !readUpdateIds.has(update.id));
      const earlierUpdates = visible.filter(update => readUpdateIds.has(update.id));
      const groups = [];
      if (newUpdates.length) groups.push(["New", newUpdates]);
      if (earlierUpdates.length) groups.push(["Earlier", earlierUpdates]);

      groups.forEach(([label, updates]) => {
        const heading = document.createElement("div");
        heading.className = "update-group-title";
        heading.textContent = label;
        notificationList.appendChild(heading);
        updates.forEach(update => {
        const general = isGeneralUpdate(update);
        const card = document.createElement("div");
        card.className = "update-card";
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", (update.payload?.pinned ? "Pinned. " : "") + "Open " + (update.title || "notification"));
        card.classList.toggle("unread", !readUpdateIds.has(update.id));
        card.classList.toggle("pinned", Boolean(update.payload?.pinned));
        const symbol = document.createElement("span");
        symbol.className = "update-symbol" + (general ? " general" : "");
        symbol.textContent = general ? "i" : "⚑";
        symbol.setAttribute("aria-hidden", "true");
        const copy = document.createElement("span");
        copy.className = "update-copy";
        const category = document.createElement("small");
        category.className = "update-category" + (general ? " general" : "");
        category.textContent = (update.payload?.pinned ? "PINNED · " : "") + (update.campaign_title || (update.campaign_key === "general" ? "General Info" : "Campaign"));
        const title = document.createElement("strong");
        title.textContent = update.title || update.campaign_title || "Campaign Update";
        const summary = document.createElement("span");
        summary.textContent = update.summary || "";
        copy.append(category, title, summary);
        const time = document.createElement("span");
        time.className = "update-time";
        time.textContent = friendlyUpdateTime(update.published_at);
        card.append(symbol, copy, time);
        card.addEventListener("click", () => openUpdateDetail(update));
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            card.click();
          }
        });
        notificationList.appendChild(card);
        });
      });
      refreshUnreadUI();
    }

    function metricCard(label, value) {
      const card = document.createElement("div");
      card.className = "detail-metric";
      const caption = document.createElement("small");
      caption.textContent = label;
      const number = document.createElement("strong");
      number.textContent = value;
      card.append(caption, number);
      return card;
    }

    function moneyValue(value) {
      return "RM" + Number(value || 0).toLocaleString("en-MY", { minimumFractionDigits:2, maximumFractionDigits:2 });
    }

    function usableTargetUrl(update) {
      if (!update?.target_url) return "";
      try {
        const url = new URL(update.target_url);
        if (url.protocol !== "https:") return "";
        if (url.origin === location.origin && (url.pathname === "/" || url.pathname === "/index.html")) return "";
        return url.href;
      } catch {
        return "";
      }
    }

    function openUpdateDetail(update) {
      selectedUpdate = update;
      badgeSyncReady = true;
      readUpdateIds.add(update.id);
      saveReadUpdates();
      const general = isGeneralUpdate(update);
      const category = document.getElementById("detailCategory");
      category.className = "update-category" + (general ? " general" : "");
      category.textContent = (update.payload?.pinned ? "PINNED · " : "") + (update.campaign_title || (general ? "General Info" : "Campaign"));
      document.getElementById("detailHeaderTitle").textContent = general ? "General Info" : "Campaign Update";
      document.getElementById("detailDate").textContent = friendlyFullDate(update.published_at);
      document.getElementById("detailTitle").textContent = update.title || "Update";
      document.getElementById("detailSummary").textContent = update.summary || "";
      document.getElementById("detailBody").textContent = update.body || "";

      const metrics = document.getElementById("detailMetrics");
      metrics.textContent = "";
      const payload = update.payload || {};
      if (!general && ("newAmount" in payload || "newCases" in payload || "currentTotal" in payload)) {
        metrics.append(
          metricCard("This Week", moneyValue(payload.newAmount)),
          metricCard("Cases", String(payload.newCases || 0)),
          metricCard("Total", moneyValue(payload.currentTotal))
        );
        metrics.hidden = false;
      } else {
        metrics.hidden = true;
      }

      const targetUrl = usableTargetUrl(update);
      detailLink.hidden = !targetUrl;
      detailLink.textContent = general ? "Open Link ↗" : "View Latest Ranking ↗";
      detailLink.dataset.url = targetUrl;
      detailUnread.textContent = "Mark Unread";
      notificationDetail.hidden = false;
      renderUpdates();
      setTimeout(() => document.getElementById("detailBack").focus({ preventScroll:true }), 30);
    }

    function closeUpdateDetail() {
      notificationDetail.hidden = true;
      selectedUpdate = null;
      const firstCard = notificationList.querySelector(".update-card");
      if (firstCard) firstCard.focus({ preventScroll:true });
    }

    function toggleSelectedReadState() {
      if (!selectedUpdate) return;
      badgeSyncReady = true;
      if (readUpdateIds.has(selectedUpdate.id)) {
        readUpdateIds.delete(selectedUpdate.id);
        detailUnread.textContent = "Mark Read";
        showToast("Marked as unread.");
      } else {
        readUpdateIds.add(selectedUpdate.id);
        detailUnread.textContent = "Mark Unread";
        showToast("Marked as read.");
      }
      saveReadUpdates();
      renderUpdates();
    }

    async function shareSelectedUpdate() {
      if (!selectedUpdate) return;
      const link = usableTargetUrl(selectedUpdate);
      const text = [selectedUpdate.body || selectedUpdate.summary || "", link].filter(Boolean).join("\n\n");
      if (navigator.share) {
        try {
          await navigator.share({ title:selectedUpdate.title || "NGC Update", text });
          return;
        } catch (error) {
          if (error && error.name === "AbortError") return;
        }
      }
      try {
        await navigator.clipboard.writeText(text);
        showToast("Update copied.");
      } catch {
        alert(text);
      }
    }

    async function loadCampaignUpdates(silent = false) {
      if (updatesLoading) return;
      if (!/^https?:$/.test(location.protocol)) {
        renderUpdates();
        return;
      }
      updatesLoading = true;
      refreshUpdates.disabled = true;
      refreshUpdates.classList.add("loading");
      if (!silent) notificationMeta.textContent = "Refreshing updates…";
      try {
        const response = await fetch(PUSH_API_URL + "?action=list&limit=30", {
          cache:"no-store",
          headers:{ "apikey":PUSH_API_KEY, "Authorization":"Bearer " + PUSH_API_KEY }
        });
        if (!response.ok) throw new Error("Updates unavailable");
        const result = await response.json();
        campaignUpdates = normalizeUpdates(result.updates);
        badgeSyncReady = true;
        lastSuccessfulUpdateFetch = Date.now();
        saveCachedUpdates();
      } catch {
        if (!campaignUpdates.length) notificationMeta.textContent = "Updates are temporarily unavailable";
        else showToast("Could not refresh updates.");
      } finally {
        updatesLoading = false;
        refreshUpdates.disabled = false;
        refreshUpdates.classList.remove("loading");
      }
      renderUpdates();
    }

    function refreshUpdatesIfStale() {
      if (document.hidden || updatesLoading || !navigator.onLine) return;
      if (Date.now() - lastSuccessfulUpdateFetch < 5000) return;
      loadCampaignUpdates(true);
    }

    function openNotificationCentre(updateHash = true) {
      if (tool.classList.contains("active")) showHome(false);
      notificationDetail.hidden = true;
      selectedUpdate = null;
      notificationBackdrop.hidden = false;
      document.body.style.overflow = "hidden";
      if (updateHash && location.hash !== "#notifications") history.pushState({ notifications:true }, "", "#notifications");
      renderUpdates();
      loadCampaignUpdates(true);
      setTimeout(() => document.getElementById("notificationClose").focus({ preventScroll:true }), 30);
    }

    function closeNotificationCentre(updateHash = true) {
      notificationDetail.hidden = true;
      selectedUpdate = null;
      notificationBackdrop.hidden = true;
      document.body.style.overflow = "";
      if (updateHash && location.hash === "#notifications") history.replaceState({}, "", location.pathname + location.search);
      notificationButton.focus({ preventScroll:true });
    }

    function decode(value) {
      const bytes = Uint8Array.from(atob(value), character => character.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isStandalone() {
      return matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;
    }

    function applicationServerKey(value) {
      const padding = "=".repeat((4 - value.length % 4) % 4);
      const base64 = (value + padding).replace(/-/g, "+").replace(/_/g, "/");
      return Uint8Array.from(atob(base64), character => character.charCodeAt(0));
    }

    function setNotificationUI(active) {
      notificationButton.classList.toggle("active", active);
      notificationButton.setAttribute("aria-label", "Open Notification Centre" + (active ? ", push notifications on" : ""));
      notificationButton.title = "Notification Centre";
      pushToggle.classList.toggle("active", active);
      pushToggle.textContent = active ? "On" : "Turn On";
      pushStatus.textContent = active ? "Alerts are enabled on this device" : "Get alerts when an update is published";
    }

    async function getPushRegistration() {
      if (!("serviceWorker" in navigator)) throw new Error("Service workers are not supported");
      await navigator.serviceWorker.register("service-worker.js");
      return navigator.serviceWorker.ready;
    }

    async function refreshNotificationUI() {
      if (!("PushManager" in window) || !("Notification" in window)) return setNotificationUI(false);
      try {
        const registration = await getPushRegistration();
        setNotificationUI(Boolean(await registration.pushManager.getSubscription()));
      } catch {
        setNotificationUI(false);
      }
    }

    async function callPushApi(payload) {
      const response = await fetch(PUSH_API_URL, {
        method: "POST",
        headers: { "Content-Type":"application/json", "apikey":PUSH_API_KEY, "Authorization":"Bearer " + PUSH_API_KEY },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error("Push service request failed");
      return response.json();
    }

    async function toggleNotifications() {
      if (notificationBusy) return;
      if (isIOS() && !isStandalone()) {
        showToast("On iPhone: Share → Add to Home Screen, then open NGC and tap the bell.");
        return;
      }
      if (!("PushManager" in window) || !("Notification" in window)) {
        showToast("Push notifications are not supported on this device.");
        return;
      }

      notificationBusy = true;
      pushToggle.disabled = true;
      try {
        const registration = await getPushRegistration();
        const current = await registration.pushManager.getSubscription();
        if (current) {
          await callPushApi({ action: "unsubscribe", endpoint: current.endpoint });
          await current.unsubscribe();
          setNotificationUI(false);
          showToast("Notifications turned off.");
          return;
        }

        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          showToast(permission === "denied" ? "Notifications are blocked in Settings." : "Notification permission was not granted.");
          return;
        }

        const configResponse = await fetch(PUSH_API_URL, {
          cache:"no-store",
          headers:{ "apikey":PUSH_API_KEY, "Authorization":"Bearer " + PUSH_API_KEY }
        });
        if (!configResponse.ok) throw new Error("Push configuration unavailable");
        const config = await configResponse.json();
        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: applicationServerKey(config.vapidPublicKey)
        });
        try {
          await callPushApi({ action: "subscribe", subscription: subscription.toJSON() });
        } catch (error) {
          await subscription.unsubscribe();
          throw error;
        }
        setNotificationUI(true);
        showToast("Notifications are on.");
      } catch (error) {
        console.error(error);
        showToast("Could not update notifications. Please try again.");
      } finally {
        notificationBusy = false;
        pushToggle.disabled = false;
      }
    }

    function openApp(id, updateHash = true) {
      const app = apps[id];
      if (!app) return showHome(updateHash);
      const frame = frames[id];
      home.hidden = true;
      tool.classList.add("active");
      toolName.textContent = app.name;
      Object.entries(frames).forEach(([frameId, element]) => element.classList.toggle("active", frameId === id));
      if (!frame.dataset.loaded) {
        frame.srcdoc = decode(app.html);
        frame.dataset.loaded = "true";
      }
      document.title = app.name + " · NGC Super App";
      if (updateHash) history.pushState({ app: id }, "", "#" + id);
      window.scrollTo(0, 0);
      if (matchMedia("(pointer:fine)").matches) document.getElementById("back").focus({ preventScroll: true });
    }

    function showHome(updateHash = true) {
      tool.classList.remove("active");
      home.hidden = false;
      document.title = "NGC Super App";
      if (updateHash) history.pushState({}, "", location.pathname + location.search);
      window.scrollTo(0, 0);
    }

    document.querySelectorAll("[data-open]").forEach(button => {
      button.addEventListener("click", () => openApp(button.dataset.open));
    });
    notificationButton.addEventListener("click", () => openNotificationCentre());
    pushToggle.addEventListener("click", toggleNotifications);
    refreshUpdates.addEventListener("click", () => loadCampaignUpdates(false));
    notificationFilters.addEventListener("click", event => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      notificationFilter = button.dataset.filter;
      storageSet("ngcNotificationFilter", notificationFilter);
      renderUpdates();
    });
    document.getElementById("detailBack").addEventListener("click", closeUpdateDetail);
    detailUnread.addEventListener("click", toggleSelectedReadState);
    document.getElementById("detailShare").addEventListener("click", shareSelectedUpdate);
    detailLink.addEventListener("click", () => {
      const target = detailLink.dataset.url;
      if (target) window.open(target, "_blank", "noopener,noreferrer");
    });
    document.getElementById("notificationClose").addEventListener("click", () => closeNotificationCentre());
    notificationBackdrop.addEventListener("click", event => {
      if (event.target === notificationBackdrop) closeNotificationCentre();
    });
    markAllRead.addEventListener("click", () => {
      badgeSyncReady = true;
      campaignUpdates.forEach(update => readUpdateIds.add(update.id));
      saveReadUpdates();
      renderUpdates();
    });
    document.addEventListener("keydown", event => {
      if (event.key !== "Escape" || notificationBackdrop.hidden) return;
      if (!notificationDetail.hidden) closeUpdateDetail(); else closeNotificationCentre();
    });
    campaignCard.addEventListener("click", event => {
      if (!navigator.onLine) {
        event.preventDefault();
        showToast("Campaign needs an internet connection.");
      }
    });
    window.addEventListener("offline", () => showToast("You are offline. Calculators still work."));
    window.addEventListener("online", refreshUpdatesIfStale);
    window.addEventListener("pageshow", refreshUpdatesIfStale);
    document.addEventListener("visibilitychange", refreshUpdatesIfStale);
    document.getElementById("back").addEventListener("click", () => showHome());
    window.addEventListener("popstate", () => {
      const id = location.hash.slice(1);
      if (id === "notifications") {
        showHome(false);
        openNotificationCentre(false);
      } else {
        notificationDetail.hidden = true;
        selectedUpdate = null;
        notificationBackdrop.hidden = true;
        document.body.style.overflow = "";
        if (apps[id]) openApp(id, false); else showHome(false);
      }
    });
    const initial = location.hash.slice(1);
    if (apps[initial]) openApp(initial, false);
    if (initial === "notifications") openNotificationCentre(false);
    loadCampaignConfig();
    renderUpdates();
    loadCampaignUpdates(true);
    setTimeout(refreshUpdatesIfStale, 1800);
    if ("serviceWorker" in navigator && /^https?:$/.test(location.protocol)) {
      navigator.serviceWorker.addEventListener("message", event => {
        if (event.data?.type === "ngc-update") loadCampaignUpdates(true);
      });
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").then(async registration => {
          await refreshNotificationUI();
          const unread = campaignUpdates.filter(update => !readUpdateIds.has(update.id)).length;
          syncSystemBadge(unread, registration);
        }).catch(() => {});
      });
    }
  </script>
</body>
